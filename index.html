<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca Privada de CDs</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1, h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-scan { background-color: #2ecc71; color: white; }
        .btn-scan:active { background-color: #27ae60; }
        
        /* Panel de Archivos Locales */
        .io-container {
            background-color: #ebf3f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #aed6f1;
            margin-bottom: 15px;
        }
        .io-title { font-weight: bold; font-size: 12px; margin-bottom: 8px; color: #2980b9; text-transform: uppercase; text-align: center; }
        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-buttons button { margin: 0; padding: 10px; font-size: 13px; }
        .btn-save-json { background-color: #8e44ad; color: white; }
        .btn-load-json { background-color: #e67e22; color: white; }
        .btn-excel { background-color: #34495e; color: white; grid-column: span 2; margin-top: 4px; }
        
        /* Contenedor de Carga Manual */
        .manual-container {
            background-color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border: 1px solid #dcdde1;
        }
        .manual-title { font-weight: bold; font-size: 13px; margin-bottom: 8px; color: #7f8c8d; text-transform: uppercase; }
        .flex-row { display: flex; gap: 8px; }
        .input-box {
            flex: 1;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn-manual { width: auto; margin: 0; background-color: #3498db; color: white; padding: 10px 15px; }
        .btn-manual:active { background-color: #2980b9; }

        .search-box {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 2px solid #bdc3c7;
            border-radius: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        
        #scanner-container {
            width: 100%;
            height: 280px;
            border: 3px solid #2c3e50;
            background-color: #000;
            overflow: hidden;
            position: relative;
            display: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Lista de CDs */
        .cd-card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            margin-bottom: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            position: relative;
        }
        .cd-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ddd;
        }
        .cd-info { flex: 1; }
        .cd-title { font-weight: bold; font-size: 16px; color: #2c3e50; margin-bottom: 4px; }
        .cd-artist { color: #7f8c8d; font-size: 14px; }
        .cd-meta { font-size: 11px; color: #bdc3c7; margin-top: 5px; }
        
        .btn-delete {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            position: absolute;
            right: 10px;
            top: 10px;
            width: auto;
            margin: 0;
        }
        /* Input de archivo oculto */
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mi Discoteca</h1>
    
    <button id="btn-scan" class="btn-scan">Iniciar Cámara y Escanear</button>
    
    <div id="scanner-container">
        <video id="video"></video>
    </div>

    <div class="manual-container">
        <div class="manual-title">Carga manual (Si no escanea)</div>
        <div class="flex-row">
            <input type="number" id="manual-barcode" class="input-box" placeholder="Ej: 5017615841725" inputmode="numeric">
            <button id="btn-manual-search" class="btn-manual">Buscar</button>
        </div>
    </div>

    <div class="io-container">
        <div class="io-title">Gestión de Base de Datos Local</div>
        <div class="grid-buttons">
            <button id="btn-save-json" class="btn-save-json">💾 Guardar Archivo .JSON</button>
            <button id="btn-load-json" class="btn-load-json">📂 Cargar Archivo .JSON</button>
            <button id="btn-excel" class="btn-excel">📊 Exportar Tabla a Excel (CSV)</button>
        </div>
        <input type="file" id="file-input" accept=".json">
    </div>
    
    <h2>Mis CDs Guardados (<span id="cd-count">0</span>)</h2>
    
    <input type="text" id="search-input" class="search-box" placeholder="🔍 Buscar en mi biblioteca guardada...">
    
    <div id="library-list"></div>
</div>

<script>
    const DISCOGS_TOKEN = "VJFMxCRcwuYdQYnJlgLPVtQEvxNDlgRuMpTwnsBQ";
    let library = JSON.parse(localStorage.getItem('my_cd_library')) || [];
    let codeReader = null;
    let isScanning = false;

    updateLibraryUI();

    // Eventos
    document.getElementById('btn-scan').addEventListener('click', () => {
        if (isScanning) stopScanner(); else startScanner();
    });
    document.getElementById('btn-excel').addEventListener('click', exportToCSV);
    document.getElementById('btn-save-json').addEventListener('click', saveAsJSON);
    document.getElementById('btn-load-json').addEventListener('click', () => document.getElementById('file-input').click());
    document.getElementById('file-input').addEventListener('change', loadFromJSON);

    document.getElementById('btn-manual-search').addEventListener('click', () => {
        const inputEl = document.getElementById('manual-barcode');
        const barcodeValue = inputEl.value.trim();
        if (barcodeValue === "") { alert("Por favor, ingresá un código."); return; }
        buscarEnDiscogs(barcodeValue);
        inputEl.value = ""; 
    });

    document.getElementById('search-input').addEventListener('input', (e) => {
        updateLibraryUI(e.target.value.toLowerCase());
    });

    // Guardar base de datos en un archivo físico JSON
    function saveAsJSON() {
        if (library.length === 0) { alert("No hay datos para guardar."); return; }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "biblioteca_cds.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // Cargar base de datos desde un archivo físico JSON
    function loadFromJSON(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const importedLibrary = JSON.parse(evt.target.result);
                if (Array.isArray(importedLibrary)) {
                    if (confirm(`¿Querés cargar ${importedLibrary.length} CDs? Esto reemplazará la lista actual del navegador.`)) {
                        library = importedLibrary;
                        localStorage.setItem('my_cd_library', JSON.stringify(library));
                        updateLibraryUI();
                    }
                } else { alert("El formato del archivo no es válido."); }
            } catch (err) { alert("Error al leer el archivo JSON."); }
        };
        reader.readAsText(file);
        e.target.value = ''; // Resetear input
    }

    // Cámara y Escáner
    function startScanner() {
        const container = document.getElementById('scanner-container');
        container.style.display = 'block';
        const btn = document.getElementById('btn-scan');
        btn.innerText = "Detener Cámara";
        btn.style.backgroundColor = "#e74c3c";
        isScanning = true;

        codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
            if (result) { beep(); stopScanner(); buscarEnDiscogs(result.text); }
        }).catch(() => { alert("Error de cámara."); stopScanner(); });
    }

    function stopScanner() {
        if (codeReader) codeReader.reset();
        document.getElementById('scanner-container').style.display = 'none';
        const btn = document.getElementById('btn-scan');
        btn.innerText = "Iniciar Cámara y Escanear";
        btn.style.backgroundColor = "#2ecc71";
        isScanning = false;
    }

    function buscarEnDiscogs(barcode) {
        const url = `https://api.discogs.com/database/search?barcode=${barcode}&token=${DISCOGS_TOKEN}`;
        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.results && data.results.length > 0) {
                    const result = data.results[0];
                    let partes = result.title.split(' - ');
                    let artista = partes[0] || "Artista Desconocido";
                    let titulo = partes[1] || "Álbum Desconocido";

                    const nuevoCD = {
                        id: result.id,
                        title: titulo,
                        artist: artista,
                        year: result.year || 'N/A',
                        cover: result.cover_image || '',
                        barcode: barcode
                    };

                    if (!library.some(item => item.id === nuevoCD.id)) {
                        library.unshift(nuevoCD);
                        localStorage.setItem('my_cd_library', JSON.stringify(library));
                        document.getElementById('search-input').value = ''; 
                        updateLibraryUI();
                    } else { alert(`El álbum "${titulo}" ya está en tu biblioteca.`); }
                } else { alert(`No se encontraron datos para: ${barcode}`); }
            })
            .catch(() => alert("Error de conexión con Discogs."));
    }

    function updateLibraryUI(filterQuery = "") {
        const listContainer = document.getElementById('library-list');
        const countSpan = document.getElementById('cd-count');
        listContainer.innerHTML = '';
        
        const filteredLibrary = library.filter(cd => 
            cd.title.toLowerCase().includes(filterQuery) || 
            cd.artist.toLowerCase().includes(filterQuery)
        );

        countSpan.innerText = library.length;

        filteredLibrary.forEach(cd => {
            const card = document.createElement('div');
            card.className = 'cd-card';
            card.innerHTML = `
                <img src="${cd.cover}" alt="Tapa" onerror="this.src='https://via.placeholder.com/70?text=CD'">
                <div class="cd-info">
                    <div class="cd-title">${cd.title}</div>
                    <div class="cd-artist">${cd.artist}</div>
                    <div class="cd-meta">Año: ${cd.year} | Cód: ${cd.barcode}</div>
                </div>
                <button class="btn-delete" onclick="deleteCD(${cd.id})">🗑️</button>
            `;
            listContainer.appendChild(card);
        });
    }

    function deleteCD(id) {
        if (confirm("¿Eliminar este CD?")) {
            library = library.filter(item => item.id !== id);
            localStorage.setItem('my_cd_library', JSON.stringify(library));
            updateLibraryUI(document.getElementById('search-input').value.toLowerCase());
        }
    }

    function exportToCSV() {
        if (library.length === 0) { alert("No hay datos."); return; }
        let csvContent = "\uFEFF" + "Artista;Álbum;Año;Código de Barras;ID Discogs\n";
        library.forEach(cd => {
            let artista = cd.artist.replace(/;/g, ',');
            let titulo = cd.title.replace(/;/g, ',');
            csvContent += `"${artista}";"${titulo}";"${cd.year}";"${cd.barcode}";"${cd.id}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.setAttribute("href", URL.createObjectURL(blob));
        link.setAttribute("download", "mi_biblioteca_cds.csv");
        document.body.appendChild(link);
        link.click();
        link.remove();
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }
</script>
</body>
</html>
