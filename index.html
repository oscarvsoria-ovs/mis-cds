<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca Privada de CDs</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .container { max-width: 500px; margin: 0 auto; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button:active { background-color: #27ae60; }
        #scanner-container {
            width: 100%;
            height: 280px;
            border: 3px solid #2c3e50;
            background-color: #000;
            overflow: hidden;
            position: relative;
            display: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cd-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .cd-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ddd;
        }
        .cd-info { flex: 1; }
        .cd-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .cd-artist { color: #7f8c8d; font-size: 14px; }
        .cd-meta { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mi Discoteca</h1>
    
    <button id="btn-scan">Iniciar Cámara y Escanear</button>
    
    <div id="scanner-container">
        <video id="video"></video>
    </div>
    
    <h2>Mis CDs Guardados (<span id="cd-count">0</span>)</h2>
    <div id="library-list"></div>
</div>

<script>
    const DISCOGS_TOKEN = "VJFMxCRcwuYdQYnJlgLPVtQEvxNDlgRuMpTwnsBQ";
    let library = JSON.parse(localStorage.getItem('my_cd_library')) || [];
    let codeReader = null;
    let isScanning = false;

    updateLibraryUI();

    document.getElementById('btn-scan').addEventListener('click', () => {
        if (isScanning) {
            stopScanner();
        } else {
            startScanner();
        }
    });

    function startScanner() {
        const container = document.getElementById('scanner-container');
        container.style.display = 'block';
        document.getElementById('btn-scan').innerText = "Detener Cámara";
        document.getElementById('btn-scan').style.backgroundColor = "#e74c3c";
        isScanning = true;

        // Inicializamos el lector moderno de ZXing
        codeReader = new ZXing.BrowserMultiFormatReader();
        
        // Forzamos al navegador a pedir la cámara trasera (environment) de forma nativa e infalible
        codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
            if (result) {
                beep();
                stopScanner();
                buscarEnDiscogs(result.text);
            }
            if (err && !(err instanceof ZXing.NotFoundException)) {
                console.error(err);
            }
        }).catch(err => {
            alert("Error directo de cámara: Asegúrate de dar los permisos en el navegador.");
            stopScanner();
        });
    }

    function stopScanner() {
        if (codeReader) {
            codeReader.reset();
        }
        document.getElementById('scanner-container').style.display = 'none';
        document.getElementById('btn-scan').innerText = "Iniciar Cámara y Escanear";
        document.getElementById('btn-scan').style.backgroundColor = "#2ecc71";
        isScanning = false;
    }

    function buscarEnDiscogs(barcode) {
        const url = `https://api.discogs.com/database/search?barcode=${barcode}&token=${DISCOGS_TOKEN}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.results && data.results.length > 0) {
                    const result = data.results[0];
                    let partes = result.title.split(' - ');
                    let artista = partes[0] || "Artista Desconocido";
                    let titulo = partes[1] || "Álbum Desconocido";

                    const nuevoCD = {
                        id: result.id,
                        title: titulo,
                        artist: artista,
                        year: result.year || 'N/A',
                        cover: result.cover_image || '',
                        barcode: barcode
                    };

                    if (!library.some(item => item.id === nuevoCD.id)) {
                        library.unshift(nuevoCD);
                        localStorage.setItem('my_cd_library', JSON.stringify(library));
                        updateLibraryUI();
                    } else {
                        alert(`El álbum "${titulo}" ya está en tu biblioteca.`);
                    }
                } else {
                    alert(`No se encontraron datos en Discogs para el código: ${barcode}`);
                }
            })
            .catch(error => {
                alert("Error de conexión con el servidor musical.");
            });
    }

    function updateLibraryUI() {
        const listContainer = document.getElementById('library-list');
        const countSpan = document.getElementById('cd-count');
        listContainer.innerHTML = '';
        countSpan.innerText = library.length;

        library.forEach(cd => {
            const card = document.createElement('div');
            card.className = 'cd-card';
            card.innerHTML = `
                <img src="${cd.cover}" alt="Tapa" onerror="this.src='https://via.placeholder.com/70?text=CD'">
                <div class="cd-info">
                    <div class="cd-title">${cd.title}</div>
                    <div class="cd-artist">${cd.artist}</div>
                    <div class="cd-meta">Año: ${cd.year} | Cód: ${cd.barcode}</div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }
</script>

</body>
</html>
