<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca Privada de CDs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .container { max-width: 500px; margin: 0 auto; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        button:active { background-color: #2980b9; }
        #scanner-container {
            width: 100%;
            height: 250px;
            border: 2px solid #34495e;
            background-color: #000;
            overflow: hidden;
            position: relative;
            display: none;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        #scanner-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .cd-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .cd-card img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #ddd;
        }
        .cd-info { flex: 1; }
        .cd-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .cd-artist { color: #7f8c8d; font-size: 14px; }
        .cd-meta { font-size: 12px; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mi Discoteca</h1>
    
    <button id="btn-scan">Escanear Código de Barras</button>
    
    <div id="scanner-container"></div>
    
    <h2>Mis CDs Guardados (<span id="cd-count">0</span>)</h2>
    <div id="library-list"></div>
</div>

<script>
    // Configuración del Token de Discogs obtenido
    const DISCOGS_TOKEN = "VJFMxCRcwuYdQYnJlgLPVtQEvxNDlgRuMpTwnsBQ";
    
    let library = JSON.parse(localStorage.getItem('my_cd_library')) || [];
    let isScanning = false;

    // Inicializar la interfaz cargando los CDs ya guardados
    updateLibraryUI();

    document.getElementById('btn-scan').addEventListener('click', () => {
        if (isScanning) {
            stopScanner();
        } else {
            startScanner();
        }
    });

    function startScanner() {
        const container = document.getElementById('scanner-container');
        container.style.display = 'block';
        document.getElementById('btn-scan').innerText = "Cancelar Escaneo";
        isScanning = true;

        Quagga.init({
            inputs: { target: container },
            decoder: {
                readers: ["ean_reader", "upc_reader", "code_128_reader"] // Formatos típicos de CDs
            },
            locate: true
        }, function(err) {
            if (err) {
                console.error(err);
                alert("Error al iniciar la cámara");
                stopScanner();
                return;
            }
            Quagga.start();
        });

        // Evento que se dispara al detectar un código de barras
        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            if (code) {
                // Emitimos un pitido sutil usando la API de audio nativa
                beep(); 
                stopScanner();
                buscarEnDiscogs(code);
            }
        });
    }

    function stopScanner() {
        Quagga.stop();
        document.getElementById('scanner-container').style.display = 'none';
        document.getElementById('btn-scan').innerText = "Escanear Código de Barras";
        isScanning = false;
    }

    // Consulta HTTP asíncrona a la API de Discogs
    function buscarEnDiscogs(barcode) {
        const url = `https://api.discogs.com/database/search?barcode=${barcode}&token=${DISCOGS_TOKEN}`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.results && data.results.length > 0) {
                    const result = data.results[0]; // Tomamos la coincidencia más exacta
                    
                    // Separamos el formato típico "Artista - Título" que devuelve Discogs
                    let partes = result.title.split(' - ');
                    let artista = partes[0] || "Artista Desconocido";
                    let titulo = partes[1] || "Álbum Desconocido";

                    const nuevoCD = {
                        id: result.id,
                        title: titulo,
                        artist: artista,
                        year: result.year || 'N/A',
                        cover: result.cover_image || '',
                        barcode: barcode
                    };

                    // Validar si ya existe en la biblioteca para no duplicar
                    if (!library.some(item => item.id === nuevoCD.id)) {
                        library.unshift(nuevoCD); // Añadir al principio de la lista
                        localStorage.setItem('my_cd_library', JSON.stringify(library));
                        updateLibraryUI();
                    } else {
                        alert(`El álbum "${titulo}" ya está en tu biblioteca.`);
                    }
                } else {
                    alert(`No se encontraron datos para el código: ${barcode}`);
                }
            })
            .catch(error => {
                console.error("Error en la conexión:", error);
                alert("Error al conectar con la base de datos musical.");
            });
    }

    function updateLibraryUI() {
        const listContainer = document.getElementById('library-list');
        const countSpan = document.getElementById('cd-count');
        listContainer.innerHTML = '';
        countSpan.innerText = library.length;

        library.forEach(cd => {
            const card = document.createElement('div');
            card.className = 'cd-card';
            card.innerHTML = `
                <img src="${cd.cover}" alt="Tapa" onerror="this.src='https://via.placeholder.com/70?text=CD'">
                <div class="cd-info">
                    <div class="cd-title">${cd.title}</div>
                    <div class="cd-artist">${cd.artist}</div>
                    <div class="cd-meta">Año: ${cd.year} | Cód: ${cd.barcode}</div>
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    // Generador de audio simple para confirmar el escaneo
    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }
</script>

</body>
</html>
